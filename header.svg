<svg width="900" height="220" viewBox="0 0 900 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="900" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#080808"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4F9EFF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#4F9EFF"/>
      <stop offset="1" stop-color="#4F9EFF" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-900 0; 900 0; -900 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#4F9EFF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#4F9EFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="900" height="220" rx="14" fill="url(#bgGrad)"/>

  <!-- ambient glow drifting -->
  <circle cx="720" cy="60" r="180" fill="url(#glow)">
    <animate attributeName="cx" values="720;640;720" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="60;120;60" dur="9s" repeatCount="indefinite"/>
  </circle>

  <!-- subtle grid dots -->
  <g fill="#4F9EFF" opacity="0.10">
    <circle cx="60" cy="40" r="1.5"/><circle cx="120" cy="40" r="1.5"/><circle cx="180" cy="40" r="1.5"/>
    <circle cx="60" cy="80" r="1.5"/><circle cx="120" cy="80" r="1.5"/>
    <circle cx="780" cy="170" r="1.5"/><circle cx="840" cy="170" r="1.5"/>
    <circle cx="780" cy="130" r="1.5"/><circle cx="840" cy="130" r="1.5"/><circle cx="840" cy="90" r="1.5"/>
  </g>

  <!-- name -->
  <text x="60" y="105" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="44" font-weight="700" fill="#F2F2F4" letter-spacing="-1">
    Sagar Prajapati
    <animate attributeName="opacity" values="0;1" dur="1.2s" fill="freeze"/>
  </text>

  <!-- role line -->
  <text x="62" y="140" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" font-weight="400" fill="#8B8B94" letter-spacing="0.3">
    Full-Stack Developer&#160;&#160;·&#160;&#160;Founder @ PortfolioAI&#160;&#160;·&#160;&#160;Applied Data Science
    <animate attributeName="opacity" values="0;0;1" dur="2s" fill="freeze"/>
  </text>

  <!-- animated accent underline -->
  <rect x="60" y="158" width="370" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- code-cursor blink -->
  <rect x="412" y="72" width="3" height="38" fill="#4F9EFF">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- ship status pill -->
  <g>
    <rect x="60" y="178" width="252" height="26" rx="13" fill="#101013" stroke="#232329"/>
    <circle cx="78" cy="191" r="4" fill="#3DDC84">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="92" y="195" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12.5" fill="#8B8B94">
      shipping portfolioai.company in production
    </text>
  </g>
</svg>
